server:
  port: 8080

spring:
  application:
    name: ecommerce-service

  datasource:
    url: jdbc:postgresql://localhost:5432/ecommerce
    username: ecommerce_app
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: kafka-broker-1.internal.example.com:9092,kafka-broker-2.internal.example.com:9092
    consumer:
      group-id: ecommerce-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000

  external-services:
    shipping-provider:
      base-url: https://api.shipping-provider.com/v1
      api-key: ${SHIPPING_API_KEY}
      timeout-ms: 5000
    tax-service:
      base-url: https://tax-service.internal.example.com
      timeout-ms: 3000
    fraud-check:
      base-url: https://fraud-api.example.com/v2
      api-key: ${FRAUD_API_KEY}
      timeout-ms: 10000

  notifications:
    order-confirmation-template: order-confirmation
    shipping-template: shipping-notification
    refund-template: refund-notification
    inventory-alert-email: inventory-team@example.com
    from-address: noreply@example.com

  cors:
    allowed-origins: https://storefront.example.com,https://admin.example.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
